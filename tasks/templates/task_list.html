{% extends 'base.html' %}

{% block content %}
    <ul>
        {% for task in task_list %}
            <li>
                <a href="{% url 'tasks:task_detail' task.pk %}">
                    {{ task }}
                </a>
            </li>
        {% endfor %}
    </ul>
    <form method="POST">
        {% csrf_token %}
        {{ form }}
        <input type="submit" name="submit" value="Save Form">
    </form>
{% endblock %}
