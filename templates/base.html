<html lang="en">
    <head>
        <title>Task App</title>
    </head>
    <body>
        {% if request.user.is_authenticated %}
        Hello, {{ request.user}}
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
        {% block content %}{% endblock %}
    </body>
</html>
